name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Java Umgebung einrichten
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Anwendung bauen
        run: echo "Baue Anwendung..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Tests ausführen
        run: echo "Führe Tests aus..."

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v3

      - name: Docker Image erstellen
        run: echo "Docker Image wird gebaut..."